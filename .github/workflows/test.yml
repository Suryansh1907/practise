name: 3 Workflow for testing

on: [push, workflow_dispatch]

jobs:
  first-job:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./03Starting Project

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test